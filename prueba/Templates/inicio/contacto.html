{% extends "inicio/encabezado.html" %}

{% block titulo %}Contacto{% endblock %}

{%block imagen%}
 {%load static%}
 {%static 'inicio/imagenes/contacto.png'%}
{%endblock%}

{% block encabezado%}
   <div class="page-header">
                <div class="page-title">
                    <h3>Contacto
                    <small>Formulario de Contacto </small></h3>
                </div>
               
                
    </div>
{%endblock%}

{% block contenido %}

         
    <form class="form-horizontal" action="#" role="form">
        <div class="panel panel-default">
            <div class="panel-body">
                <div class="form-group">
                    <label class="col-sm-2 control-label text-right">Nombre:</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" name="nombre">
                    </div>
                </div>

                <div class="form-group">
                    <label class="col-sm-2 control-label text-right">Mensaje:</label>
                    <div class="col-sm-10">
                        <textarea class="form-control" name="mensaje" rows="5"></textarea>
                    </div>
                </div>
                    <div class="form-actions text-right">
                        <input type="submit" value="Enviar" class="btn btn-primary">
                    </div>    

            </div>
        </div>
    </form>

{% endblock %}
